Name: CI
on: [push, pull_request, workflow_dispatch]

jobs:
  Lint-and-Format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Format with Ruff
        run: ruff format

      - name: Lint with Ruff
        run: ruff check --output-format=github



